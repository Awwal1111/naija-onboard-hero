<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NaijaLancers</title>
  <script>
    // SPA fallback - redirect all 404s to the main app
    // This handles page refreshes on client-side routes
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('/' + '?redirect=' + encodeURIComponent(path));
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
